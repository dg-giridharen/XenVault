<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard | XenVault</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="icon" type="image/png" href="../assets/Xen_logo.png">
</head>
<body class="page-frame">
  <div class="page-content dashboard-shell">
    <header class="dashboard-header">
      <div>
        <p class="text-muted">XenVault</p>
        <h1>Dashboard</h1>
      </div>
      <div class="button-row">
        <button id="theme-toggle" class="btn-secondary">Toggle Theme</button>
        <button id="logoutBtn" class="btn-secondary">Logout</button>
      </div>
    </header>

    <main class="dashboard-main">
      <section class="stat-grid">
        <div class="stat-card">
          <p class="text-muted">Total income</p>
          <p id="totalIncome" class="stat-value stat-income">$0.00</p>
        </div>
        <div class="stat-card">
          <p class="text-muted">Total expenses</p>
          <p id="totalExpense" class="stat-value stat-expense">$0.00</p>
        </div>
        <div class="stat-card">
          <p class="text-muted">Net balance</p>
          <p id="netBalance" class="stat-value stat-balance">$0.00</p>
        </div>
      </section>

      <section class="panel-card">
        <h2>Add a transaction</h2>
        <form id="transactionForm" class="form-layout" autocomplete="off">
          <div class="form-field">
            <label for="description">Description</label>
            <input id="description" name="description" type="text" placeholder="Sale of goods" required class="field-input" />
          </div>
          <div class="form-field">
            <label for="amount">Amount</label>
            <input id="amount" name="amount" type="number" step="0.01" min="0.01" placeholder="100.00" required class="field-input" />
          </div>
          <div class="form-field">
            <label for="type">Type</label>
            <select id="type" name="type" required class="field-input">
              <option value="Income">Income</option>
              <option value="Expense">Expense</option>
            </select>
          </div>
          <button type="submit" class="btn-primary btn-full">Add</button>
        </form>
      </section>

      <section class="panel-card">
        <h2>History</h2>
        <ul id="transactionList" class="history-list" aria-live="polite"></ul>
      </section>
    </main>

    <footer class="page-footer">
      <p>Simple cash tracking for retail work.</p>
    </footer>
  </div>
  <script src="../scripts/theme.js"></script>
  <script src="../scripts/dashboard.js"></script>
</body>
</html>
