<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard | XenVault</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen">
  <div class="max-w-4xl mx-auto px-6 py-8">
    <header class="flex items-center justify-between mb-8">
      <div>
        <p class="text-xs uppercase text-slate-400">XenVault</p>
        <h1 class="mt-2 text-3xl font-semibold">Dashboard</h1>
      </div>
      <button id="logoutBtn" class="rounded-lg bg-slate-800 px-4 py-2 text-sm font-semibold text-slate-100">Logout</button>
    </header>

    <main class="space-y-6">
      <section class="flex flex-col gap-4 sm:flex-row">
        <div class="flex-1 rounded-lg border border-slate-800 bg-slate-900 p-4">
          <p class="text-sm text-slate-400">Total income</p>
          <p id="totalIncome" class="mt-2 text-2xl font-semibold text-green-300">$0.00</p>
        </div>
        <div class="flex-1 rounded-lg border border-slate-800 bg-slate-900 p-4">
          <p class="text-sm text-slate-400">Total expenses</p>
          <p id="totalExpense" class="mt-2 text-2xl font-semibold text-red-300">$0.00</p>
        </div>
        <div class="flex-1 rounded-lg border border-slate-800 bg-slate-900 p-4">
          <p class="text-sm text-slate-400">Net balance</p>
          <p id="netBalance" class="mt-2 text-2xl font-semibold text-sky-300">$0.00</p>
        </div>
      </section>

      <section class="rounded-lg border border-slate-800 bg-slate-900 p-4">
        <h2 class="text-xl font-semibold">Add a transaction</h2>
        <form id="transactionForm" class="mt-4 space-y-4" autocomplete="off">
          <div>
            <label for="description" class="block text-sm text-slate-300">Description</label>
            <input id="description" name="description" type="text" placeholder="Sale of goods" required class="w-full rounded-lg border border-slate-800 bg-slate-950 px-3 py-3 text-slate-100" />
          </div>
          <div>
            <label for="amount" class="block text-sm text-slate-300">Amount</label>
            <input id="amount" name="amount" type="number" step="0.01" min="0.01" placeholder="100.00" required class="w-full rounded-lg border border-slate-800 bg-slate-950 px-3 py-3 text-slate-100" />
          </div>
          <div>
            <label for="type" class="block text-sm text-slate-300">Type</label>
            <select id="type" name="type" required class="w-full rounded-lg border border-slate-800 bg-slate-950 px-3 py-3 text-slate-100">
              <option value="Income">Income</option>
              <option value="Expense">Expense</option>
            </select>
          </div>
          <button type="submit" class="w-full rounded-lg bg-blue-600 px-4 py-3 text-sm font-semibold text-white">Add</button>
        </form>
      </section>

      <section class="rounded-lg border border-slate-800 bg-slate-900 p-4">
        <h2 class="text-xl font-semibold">History</h2>
        <ul id="transactionList" class="mt-4 space-y-3" aria-live="polite"></ul>
      </section>
    </main>

    <footer class="mt-8 border-t border-slate-800 pt-5 text-sm text-slate-500 text-center">
      <p>Simple cash tracking for retail work.</p>
    </footer>
  </div>
  <script src="../scripts/dashboard.js"></script>
</body>
</html>
