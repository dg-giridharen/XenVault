<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | XenVault</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="icon" type="image/png" href="../assets/Xen_logo.png">
</head>
<body class="page-frame">
  <main class="page-content main-card">
    <div class="button-row">
      <button id="theme-toggle" class="btn-secondary">Toggle Theme</button>
    </div>
    <div class="card-heading">
      <p class="text-muted">XenVault</p>
      <h1>Login</h1>
      <p class="hero-copy">Sign in to open the dashboard.</p>
    </div>
    <form id="loginForm" class="form-layout" autocomplete="off">
      <div class="form-field">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" placeholder="name@company.com" required class="field-input" />
      </div>
      <div class="form-field">
        <label for="password">Password</label>
        <input id="password" name="password" type="password" placeholder="••••••••" required class="field-input" />
      </div>
      <button type="submit" class="btn-primary btn-full">Login</button>
    </form>
    <p class="page-note"><a href="../index.html" class="link-secondary">← Back to start</a></p>
  </main>
  <script src="../scripts/auth.js"></script>
  <script src="../scripts/theme.js"></script>
</body>
</html>
