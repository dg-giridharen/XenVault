<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | XenVault</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="icon" type="image/png" href="../assets/Xen_logo.png">
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex items-center justify-center px-4 py-8">
  <main class="w-full max-w-md">
    <div class="rounded-lg border border-slate-800 bg-slate-900 p-6 theme-card">
      <div class="flex justify-end mb-4">
        <button id="themeToggle" class="rounded-full bg-slate-800 px-4 py-2 text-sm font-semibold text-slate-100 hover:bg-slate-700">Switch to light</button>
      </div>
      <div class="text-center mb-6">
        <p class="text-xs uppercase text-slate-400 theme-text-muted">XenVault</p>
        <h1 class="mt-3 text-3xl font-semibold">Login</h1>
        <p class="mt-2 text-sm text-slate-400 theme-text-muted">Sign in to open the dashboard.</p>
      </div>
      <form id="loginForm" class="space-y-4" autocomplete="off">
        <div>
          <label for="email" class="block text-sm text-slate-300">Email</label>
          <input id="email" name="email" type="email" placeholder="name@company.com" required class="w-full rounded-lg border border-slate-800 bg-slate-950 px-3 py-3 text-slate-100 theme-input" />
        </div>
        <div>
          <label for="password" class="block text-sm text-slate-300">Password</label>
          <input id="password" name="password" type="password" placeholder="••••••••" required class="w-full rounded-lg border border-slate-800 bg-slate-950 px-3 py-3 text-slate-100 theme-input" />
        </div>
        <button type="submit" class="w-full rounded-lg bg-purple-900 px-4 py-3 text-sm font-semibold text-white hover:bg-purple-700">Login</button>
      </form>
    </div>
    <p class="mt-5 text-center text-sm text-slate-400 theme-text-muted"><a href="../index.html" class="text-blue-400">← Back to start</a></p>
  </main>
  <script src="../scripts/auth.js"></script>
  <script src="../scripts/theme.js"></script>
</body>
</html>
